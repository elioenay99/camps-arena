name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execucoes obsoletas do mesmo ref quando ha novo push (economiza minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Le a versao pinada de `packageManager` (pnpm@10.33.2) no package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gates de qualidade, sequenciais: o primeiro que falhar aborta o job.
      # A suite e hermetica (mocks de Supabase/next-cache/API-Football); sem segredos.
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  build:
    name: build
    runs-on: ubuntu-latest
    # So compila se os gates de qualidade passarem (economiza minutos em PR quebrado).
    needs: quality
    # `next build` avalia `next.config.ts`, que importa `src/lib/env.ts` (parse
    # fail-fast) e faz `new URL(NEXT_PUBLIC_SUPABASE_URL)`. Sao PLACEHOLDERS
    # publicos e sinteticos — nenhum segredo real. Espelham os dummies da
    # vitest.config.ts; SUPABASE_URL PRECISA ser uma URL https valida.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  audit:
    name: audit
    runs-on: ubuntu-latest
    # NAO-BLOQUEANTE por ora (continue-on-error): reporta vulnerabilidades
    # high/critical das dependencias sem reprovar o merge. Endurecer para
    # falhar em high/critical fica de follow-up.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      # `pnpm audit` resolve pelo lockfile; nao precisa de node_modules.
      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  schema:
    name: schema
    runs-on: ubuntu-latest
    # Aplica `supabase/schema.sql` (fonte de verdade) num Postgres cru e efemero
    # para pegar schema quebrado ou NAO-idempotente. Sem segredo do dono: o
    # Postgres e local ao runner e nada aponta para producao. Drift real
    # vs. producao (pg_dump/db diff com service_role) e follow-up separado.
    services:
      postgres:
        # Mesmo major do supabase/config.toml (major_version = 17).
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Espera o banco aceitar conexoes antes dos steps rodarem.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGDATABASE: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # 1. Pre-requisitos que a plataforma Supabase provisiona e um Postgres cru
      #    nao tem (papeis anon/authenticated/service_role, schemas auth/storage,
      #    publication supabase_realtime). Ver supabase/ci-bootstrap.sql.
      - name: Bootstrap de pre-requisitos (roles + auth/storage)
        run: psql -v ON_ERROR_STOP=1 -q -f supabase/ci-bootstrap.sql

      # 2. Passe 1 TOLERANTE (sem ON_ERROR_STOP): o schema tem forward-refs
      #    (ex.: coluna `rodada`, funcoes-helper de capacidade) que so resolvem
      #    no segundo passe. Erros aqui sao esperados e ignorados.
      - name: Aplica schema.sql (passe 1, tolerante)
        run: psql -q -f supabase/schema.sql || true

      # 3. Passe 2 ESTRITO (ON_ERROR_STOP=1): agora tudo ja existe, entao o
      #    schema tem de aplicar LIMPO (idempotente). Falha o job se nao aplicar.
      - name: Aplica schema.sql (passe 2, estrito)
        run: psql -v ON_ERROR_STOP=1 -q -f supabase/schema.sql

      # 4. Grants de paridade local (sem eles PostgREST/anon quebra). Estrito.
      - name: Aplica local-grants.sql (estrito)
        run: psql -v ON_ERROR_STOP=1 -q -f supabase/local-grants.sql

  rls-tests:
    name: rls-tests
    runs-on: ubuntu-latest
    # Suite de INTEGRACAO das policies RLS: exercita as ~101 policies e os
    # SECURITY DEFINER de VERDADE num Postgres real (pgTAP), fechando o
    # falso-verde estrutural dos ~100 testes hermeticos (vi.mock do Supabase).
    # DEDICADO e SEPARADO do job `quality` (que roda sem banco): nao altera o
    # run hermetico. Sem segredo do dono: o Postgres e local ao runner e nada
    # aponta para producao (dados ficticios efemeros).
    services:
      postgres:
        # Mesmo major do supabase/config.toml (major_version = 17).
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # run.sh em modo externo (nao sobe docker; usa o service container acima).
      RLS_PG_EXTERNAL: "1"
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGDATABASE: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Aplica bootstrap + schema (2 passes) + grants + pgTAP + seed e roda os
      # testes pgTAP por papel. O runner ubuntu-latest ja traz `psql` (mesmo
      # pressuposto do job `schema`). pgTAP e vendorizado (supabase/tests/
      # pgtap-1.3.3.sql) — nenhum download nem CREATE EXTENSION.
      - name: Suite RLS (pgTAP)
        run: bash supabase/tests/run.sh
