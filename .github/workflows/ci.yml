name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execucoes obsoletas do mesmo ref quando ha novo push (economiza minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Le a versao pinada de `packageManager` (pnpm@10.33.2) no package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gates de qualidade, sequenciais: o primeiro que falhar aborta o job.
      # A suite e hermetica (mocks de Supabase/next-cache/API-Football); sem segredos.
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
